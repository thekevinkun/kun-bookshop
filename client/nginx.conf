# Detect social media and search engine crawlers by User-Agent
# These bots don't execute JavaScript, so we send them to prerender.io
# which renders the full React app and returns complete HTML with meta tags
map $http_user_agent $prerender {
    default 0;
    "~*googlebot"           1;
    "~*yahoo!\\ slurp"      1;
    "~*bingbot"             1;
    "~*yandex"              1;
    "~*baiduspider"         1;
    "~*facebookexternalhit" 1;
    "~*twitterbot"          1;
    "~*rogerbot"            1;
    "~*linkedinbot"         1;
    "~*embedly"             1;
    "~*quora\\ link\\ preview" 1;
    "~*showyoubot"          1;
    "~*outbrain"            1;
    "~*pinterest\\/0\\."    1;
    "~*developers\\.google\\.com\\/\\+\\/web\\/snippet" 1;
    "~*slackbot"            1;
    "~*vkshare"             1;
    "~*w3c_validator"       1;
    "~*whatsapp"            1;
    "~*telegrambot"         1;
    "~*bot"                 1;
    "~*crawler"             1;
    "~*spider"              1;
}

server {
    # Listen on port 80 for incoming HTTP requests
    listen 80;

    # The root directory where our built React files live
    root /usr/share/nginx/html;

    # Default file to serve when a directory is requested
    index index.html;

    # Enable gzip compression to reduce file sizes sent to the browser
    gzip on;

    # Tell proxies/CDNs that the response may vary based on Accept-Encoding header
    gzip_vary on;

    # Minimum file size to compress (no point compressing tiny files)
    gzip_min_length 1024;

    # Compression level 1-9 (6 is a good balance of speed vs size)
    gzip_comp_level 6;

    # File types to compress — everything text-based and common JS/JSON formats
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml;
    
    # .mjs MUST come first — nginx picks the first matching regex location.
    # Without this, the general .js|.mjs block below would catch .mjs files
    # and serve them as application/octet-stream, which browsers reject for ES modules.
    location ~* \.mjs$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        default_type application/javascript;
    }

    # Cache all other static assets aggressively — content-hashed filenames
    # make this safe. Browser won't re-download unchanged files for 1 year.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The most important rule for a React SPA — any URL that doesn't match
    # a real file falls back to index.html so React Router handles it.
    # Without this, refreshing /books/123 would return a 404 from nginx.
    # Main SPA routing — intercepts crawler requests and sends them to prerender.io
    location / {
        # Bots get proxied to prerender.io via named location
        error_page 418 = @prerender;
        if ($prerender = 1) {
            return 418;
        }

        try_files $uri $uri/ /index.html;
    }

    location @prerender {
        proxy_set_header X-Prerender-Token "bpsHwI3GV5foewd1rn1t";
        proxy_set_header Host service.prerender.io;
        rewrite .* /https://kunbookshop.up.railway.app$request_uri break;
        proxy_pass https://service.prerender.io;
    }

    # Security headers — tells the browser not to do unsafe things
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}