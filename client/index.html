<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <meta name="apple-mobile-web-app-title" content="Kun Bookshop" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme color (browser chrome on mobile) -->
    <meta name="theme-color" content="#0a1628" />
    <meta name="msapplication-TileColor" content="#0a1628" />

    <!-- Default title/description (overridden per-page by react-helmet-async) -->
    <title>Kun Bookshop</title>
    <meta name="description" content="Discover and buy digital books at Kun Bookshop." />

    <!-- Performance: preconnect to external services -->
    <!-- Tells the browser to open a connection early, before it's actually needed -->
    <!-- Saves ~100-300ms per resource on first load -->

    <!-- Cloudinary — where all book covers and files are hosted -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <!-- Google Fonts — preconnect opens the TCP connection early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter: main body font — preload triggers fetch before CSS parses -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <!-- Cinzel: display/heading font -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap"
    />

    <!-- The actual stylesheet links — loaded non-blocking with display=swap -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap"
      media="print"
      onload="this.media='all'"
    />

    <!-- Fallback for browsers without JS — just loads them normally -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
