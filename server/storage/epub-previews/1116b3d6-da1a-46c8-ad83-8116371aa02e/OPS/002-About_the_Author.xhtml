<p class="abt">ABOUT THE AUTHOR</p>
<p class="ftxt">Satoshi Yagisawa was born in Chiba, Japan, in 1977. Days at the Morisaki Bookshop, his debut novel, was originally published in 2009 and won the Chiyoda Literature Prize.</p>
