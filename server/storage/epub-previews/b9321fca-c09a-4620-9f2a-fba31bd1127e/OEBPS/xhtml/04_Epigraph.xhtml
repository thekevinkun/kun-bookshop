			<a id="_idParaDest-3"></a>
			<p class="x14-free-style-3-first"><span epub:type="pagebreak" id="page_v" title="v"></span>a·tom·ic</p>
			<p class="x14-free-style"><span class="freefont">əˈ</span>tämik</p>
			<ol class="calibre3">
				<li class="x14-free-style1">
					<p class="x14-free-style2">an extremely small amount of a thing; the single irreducible unit of a larger system.</p>
				</li>
				<li class="x14-free-style1">
					<p class="x14-free-style2">the source of immense energy or power.</p>
				</li>
			</ol>
			<p class="x14-free-style3">hab·it</p>
			<p class="x14-free-style"><span class="freefont">ˈ</span>hab<span class="freefont">ə</span>t</p>
			<ol class="calibre3">
				<li class="x14-free-style1">
					<p class="x14-free-style2">a routine or practice performed regularly; an automatic response to a specific <span epub:type="pagebreak" id="page_vi" title="vi"></span>situation.</p>
				</li>
			</ol>
