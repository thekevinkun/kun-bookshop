# Docker Compose file for local development and testing
# For Railway deployment, each service is deployed separately

services:

  # ── MongoDB Database
  mongodb:
    # Use the official MongoDB 8 image
    image: mongo:8
    container_name: bookstore-mongodb
    # Always restart unless we manually stop it
    restart: unless-stopped
    environment:
      # Root credentials for the MongoDB instance
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: bookstore
    ports:
      # Expose MongoDB port so you can connect with MongoDB Compass locally
      - "27017:27017"
    volumes:
      # Persist database data between container restarts
      - mongodb_data:/data/db
    networks:
      - bookstore-network
    healthcheck:
      # Check MongoDB is accepting connections before backend starts
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Express Backend ──
  backend:
    # Build from our server Dockerfile
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bookstore-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_TEST_EMAIL: ${RESEND_TEST_EMAIL}
      CLIENT_URL: ${CLIENT_URL}
      API_URL: ${API_URL}
      SITE_URL: ${SITE_URL}
      LOGO_URL: ${LOGO_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CHAT_MODE: ${CHAT_MODE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "5000:5000"
    volumes:
      # Persist uploaded files between container restarts
      - ./server/uploads:/app/uploads
      # Persist logs
      - ./server/logs:/app/logs
    depends_on:
      mongodb:
        # Only start after MongoDB passes its healthcheck
        condition: service_healthy
    networks:
      - bookstore-network
    healthcheck:
      # Check our /api/health endpoint — make sure Express is responding
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React Frontend ──
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Vite bakes these into the JS bundle at build time — must be passed as build args
        VITE_API_URL: ${VITE_API_URL}
        VITE_SERVER_BASE_URL: ${VITE_SERVER_BASE_URL}
        VITE_SITE_URL: ${VITE_SITE_URL}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
    container_name: bookstore-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bookstore-network

# ── Named Volumes ──
volumes:
  # Docker-managed volume for MongoDB data persistence
  mongodb_data:

    # ── Network ──
networks:
  bookstore-network:
    # Bridge network — containers can talk to each other by service name
    driver: bridge
